<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>WAKUSEI - 个人主页</title>

        <meta name="description" content="wakusei - 个人主页" />
        <meta name="theme-color" content="#fffef7" />
        <meta property="og:title" content="WAKUSEI - 个人主页" />
        <meta property="og:description" content="wakusei - 个人主页" />
        <meta property="og:type" content="website" />
        <link rel="icon" href="res/img/logo.png" type="image/png" />

        <script>
            (function () {
                var root = document.documentElement;

                function isLegacyBrowser() {
                    try {
                        var supportsCssVars = !!(
                            window.CSS &&
                            typeof window.CSS.supports === 'function' &&
                            window.CSS.supports('--legacy-test', '0')
                        );
                        var isOldEdge = !!window.StyleMedia && !/Edg\//.test(window.navigator.userAgent);

                        return (
                            !!document.documentMode ||
                            isOldEdge ||
                            !root.classList ||
                            !window.IntersectionObserver ||
                            !supportsCssVars
                        );
                    } catch (error) {
                        return true;
                    }
                }

                if (isLegacyBrowser()) {
                    root.className += (root.className ? ' ' : '') + 'legacy-compat';
                }
            })();
        </script>

        <!-- 预连接关键域名 -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

        <!-- 字体 -->
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
            rel="stylesheet"
        />

        <!-- Font Awesome 图标 - 动态加载（超时放弃） -->
        <link rel="stylesheet" href="css/base.css" />
        <link rel="stylesheet" href="css/layout.css" />
        <link rel="stylesheet" href="css/components.css" />
        <link rel="stylesheet" href="css/responsive.css" />
    </head>
    <body>
        <!-- 背景噪点 -->
        <div class="noise-overlay"></div>

        <!-- 加载遮罩层 -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-panel">
                <div class="loading-spinner"></div>
                <div class="loading-text" id="loadingText" data-legacy-text="Loading...">少女祈祷中...</div>
                <div class="loading-progress">
                    <div class="loading-bar" id="loadingBar"></div>
                </div>
                <div class="loading-percent" id="loadingPercent">0%</div>
            </div>
        </div>

        <!-- 主页面 -->
        <main class="container" id="mainContent">
            <!-- ===== 左侧：个人信息 ===== -->
            <section class="left-panel">
                <header class="hero">
                    <!-- 头像方块 -->
                    <div class="avatar-box" id="avatarBox">
                        <img src="res/img/logo.png" alt="Avatar" class="avatar-image" />
                    </div>

                    <!-- 名称 -->
                    <h1 class="name">WAKUSEI</h1>

                    <!-- 状态栏 -->
                    <div class="status-bar">
                        <span class="status-dot"></span>
                        <span class="status-text">OPEN TO OPPORTUNITIES</span>
                    </div>

                    <!-- 简介：打字机效果 -->
                    <div class="bio-container" id="bioContainer">
                        <p class="bio">
                            <span class="typewriter-text" id="typewriterText"></span>
                            <span class="typewriter-cursor" id="cursor">█</span>
                        </p>
                    </div>

                    <!-- 社交链接 -->
                    <nav class="social-links" id="socialLinks">
                        <!-- 动态生成，由 app.js 控制 -->
                    </nav>
                </header>

                <!-- 底部版权 -->
                <footer class="footer-left">
                    <div class="footer-line"></div>
                    <p class="footer-text" id="footerText">BUILT WITH PASSION • 2024</p>
                </footer>
            </section>

            <!-- ===== 右侧：时间 + 壁纸 ===== -->
            <aside class="right-panel">
                <!-- 壁纸滚动区域（覆盖整个面板） -->
                <div class="wallpaper-scroll-area" id="wallpaperScrollArea"></div>

                <!-- 独立阴影层 - 与壁纸解耦，营造画框效果 -->
                <div class="right-panel-shadow"></div>

                <!-- 时间面板（磨砂玻璃覆盖） -->
                <div class="info-panel">
                    <div class="time-widget">
                        <div class="weekday" id="weekday">星期四</div>
                        <div class="date-display" id="dateDisplay">四月四日</div>
                        <div class="clock" id="clock">15:30:35</div>
                    </div>
                </div>
            </aside>
        </main>

        <!-- 手机端壁纸切换按钮 -->
        <button class="wallpaper-toggle" id="wallpaperToggle" aria-label="查看壁纸" title="查看壁纸">
            <svg
                viewBox="0 0 24 24"
                width="24"
                height="24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            <span class="sr-only">查看壁纸</span>
        </button>

        <!-- 手机端右侧面板关闭按钮 -->
        <button class="close-panel" id="closePanel" aria-label="关闭">
            <svg
                viewBox="0 0 24 24"
                width="24"
                height="24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
            <span class="sr-only">关闭</span>
        </button>

        <!-- JavaScript（ES Module 单入口） -->
        <script type="module" src="js/app.js"></script>
        <!-- 旧浏览器回退：不支持 ES Module 的浏览器通过此脚本提供基础功能 -->
        <script nomodule src="js/legacy.js"></script>

        <!-- 脚本加载失败兜底：禁用 JS 时移除遮罩、恢复内容可见 -->
        <noscript>
            <style>
                .container {
                    filter: none;
                    pointer-events: auto;
                }
                .loading-overlay {
                    display: none;
                }
            </style>
        </noscript>
    </body>
</html>
